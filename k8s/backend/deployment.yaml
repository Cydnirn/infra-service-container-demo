# Backend API Deployment — Go server on port 8080.
# Connects to RDS (PostgreSQL), DocumentDB, Cognito, and KMS.
# Credentials are fetched from AWS Secrets Manager at startup.
# IRSA (IAM Role for Service Account) provides AWS SDK permissions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-backend
  template:
    metadata:
      labels:
        app: student-backend
    spec:
      # IRSA service account — provides KMS and Secrets Manager permissions
      serviceAccountName: student-backend-sa
      containers:
        - name: backend
          # Image tag is overridden by Kustomize "images:" in root kustomization.yaml
          image: student-backend:placeholder
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Injected by Kustomize's configMapGenerator
          envFrom:
            - configMapRef:
                name: student-backend-config

          env:
            - name: PORT
              value: "8080"

          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "1024Mi"

          # Health checks — /healthz is public (no auth).
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2
