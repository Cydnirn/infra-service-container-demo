# Frontend sub-kustomization — Deployment + Service (ClusterIP).
# Image and API_URL are configured in the root kustomization.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: true
    pairs:
      app: student-frontend
