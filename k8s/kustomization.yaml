# ───────────────────────────────────────────────────────────
#  Kustomize — Student Management Application
# ───────────────────────────────────────────────────────────
#
#  Edit values in THIS FILE ONLY, then deploy with:
#
#    kubectl apply -k .
#
#  Preview the generated manifests without applying:
#
#    kubectl kustomize .
#
# ───────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources are deployed into this namespace.
# The namespace.yaml is still included for environments
# where the namespace does not already exist.
namespace: student-management

# ─────────────────────────────────────────────────────────
#  CONFIGURATION  (→ generated as a ConfigMap)
#  Replace the placeholder endpoints with your actual
#  RDS Proxy and DocumentDB endpoint addresses.
# ─────────────────────────────────────────────────────────
configMapGenerator:
  - name: student-backend-config
    literals:
      # RDS (PostgreSQL via RDS Proxy)
      - DB_HOST=student-management-postgres.cctsbkfnu57a.us-east-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=student_management
      # DocumentDB
      - DOCDB_DB_NAME=student_management
      - DOCDB_COLLECTION=notes
      - DOCDB_CONNECTION_STRING=mongodb://student-management-docdb.cluster-cctsbkfnu57a.us-east-1.docdb.amazonaws.com:27017/?tls=true&tlsCAFile=/usr/local/share/ca-certificates/rds-combined-ca-bundle.pem&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false
      # Cognito
      - COGNITO_USER_POOL_ID=us-east-1_Y7ITXZzl7
      - COGNITO_CLIENT_ID=7330bovjvi1vjtk7j98fvvb26a
      - COGNITO_REGION=us-east-1
      # KMS
      - KMS_KEY_ID=arn:aws:kms:us-east-1:284845684968:key/0208fa53-3654-47b1-9fdc-991fd0950736
      # AWS Region
      - AWS_REGION=us-east-1
      # DB Secret ARN (for Secrets Manager)
      - DB_SECRET_ARN=arn:aws:secretsmanager:us-east-1:284845684968:secret:student-management/db-credentials-RTuDO4
      # CORS
      - CORS_ALLOWED_ORIGIN=*

# ─────────────────────────────────────────────────────────
#  IMAGE OVERRIDES
#  newName  → full ECR / registry path
#  newTag   → version tag (change to deploy a new version)
# ─────────────────────────────────────────────────────────
images:
  - name: student-backend
    newName: 284845684968.dkr.ecr.us-east-1.amazonaws.com/student-backend
    newTag: latest
  - name: student-frontend
    newName: 284845684968.dkr.ecr.us-east-1.amazonaws.com/student-frontend
    newTag: latest

# ─────────────────────────────────────────────────────────
#  RESOURCES  (processed in order)
# ─────────────────────────────────────────────────────────
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - backend/
  - frontend/
  - ingress.yaml
