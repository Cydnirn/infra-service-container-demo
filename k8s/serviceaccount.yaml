# Service Account for the backend — annotated with the IRSA role ARN.
# This allows backend pods to assume the IAM role that grants:
#   kms:Encrypt, kms:Decrypt, kms:DescribeKey
#   secretsmanager:GetSecretValue
#
# Apply this after terraform creates the IRSA role, and update
# the eks.amazonaws.com/role-arn annotation with the output value.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: student-backend-sa
  namespace: student-management
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_IRSA_ROLE_ARN
